<div class="animate-fadeInUp">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <div>
      <h2 class="page-title">Centers Management</h2>
      <p class="page-subtitle">{{centers.length}} registered centers</p>
    </div>
    <div class="position-relative">
      <span class="material-symbols-outlined position-absolute search-icon">search</span>
      <input [(ngModel)]="search" type="text" placeholder="Search centers..."
        class="form-control-tonal ps-5" style="width:240px;">
    </div>
  </div>

  <div class="d-flex gap-2 mb-4 flex-wrap">
    <button *ngFor="let tab of filterTabs" (click)="statusFilter=tab.value"
      class="px-4 py-2 rounded-pill border-0 filter-tab"
      [class.tab-active]="statusFilter===tab.value"
      [class.tab-inactive]="statusFilter!==tab.value">
      {{tab.label}} ({{countByStatus(tab.value)}})
    </button>
  </div>

  <div class="card-premium p-0" style="overflow:hidden;">
    <div class="table-responsive">
      <table class="table table-clean mb-0" style="min-width:850px;">
        <thead>
          <tr><th>Center</th><th>Owner</th><th>Location</th><th>Bookings</th><th>Rating</th><th>Joined</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of filtered">
            <td class="center-name-cell">{{c.name}}</td>
            <td class="owner-cell">{{c.owner}}</td>
            <td>
              <div class="d-flex align-items-center gap-1">
                <span class="material-symbols-outlined loc-icon">location_on</span>
                <span class="loc-text">{{c.location}}</span>
              </div>
            </td>
            <td class="bookings-cell">{{c.bookings}}</td>
            <td>
              <div class="d-flex align-items-center gap-1" *ngIf="c.rating>0">
                <span class="material-symbols-outlined star-icon">star</span>
                <span class="rating-val">{{c.rating}}</span>
              </div>
              <span *ngIf="c.rating===0" class="no-rating">—</span>
            </td>
            <td class="joined-cell">{{c.joined}}</td>
            <td>
              <span [class]="c.status==='active'?'badge-active':c.status==='pending'?'badge-pending':'badge-blocked'">
                {{c.status}}
              </span>
            </td>
            <td>
              <div class="d-flex gap-1 flex-wrap">
                <button *ngIf="c.status==='pending'" (click)="setStatus(c.id,'active')" title="Approve"
                  class="border-0 p-2 rounded-2 action-approve">
                  <span class="material-symbols-outlined action-icon">check_circle</span>
                </button>
                <button *ngIf="c.status==='active'" (click)="setStatus(c.id,'blocked')" title="Block"
                  class="border-0 p-2 rounded-2 action-block">
                  <span class="material-symbols-outlined action-icon">block</span>
                </button>
                <button *ngIf="c.status==='blocked'" (click)="setStatus(c.id,'active')" title="Unblock"
                  class="border-0 p-2 rounded-2 action-unblock">
                  <span class="material-symbols-outlined action-icon">lock_open</span>
                </button>
                <button (click)="delete(c.id)" title="Delete"
                  class="border-0 p-2 rounded-2 action-delete">
                  <span class="material-symbols-outlined action-icon">delete</span>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="filtered.length===0">
            <td colspan="8" class="text-center py-5">
              <span class="material-symbols-outlined d-block mb-2 empty-icon">search_off</span>
              <span class="empty-title">No centers found</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
