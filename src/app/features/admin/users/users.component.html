<div class="animate-fadeInUp">
  <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
    <div>
      <h2 class="page-title">Users Management</h2>
      <p class="page-subtitle">{{users.length}} registered users</p>
    </div>
    <div class="position-relative">
      <span class="material-symbols-outlined position-absolute search-icon">search</span>
      <input [(ngModel)]="search" type="text" placeholder="Search users..."
        class="form-control-tonal ps-5" style="width:240px;">
    </div>
  </div>

  <div class="d-flex gap-2 mb-4 flex-wrap">
    <button *ngFor="let tab of filterTabs" (click)="roleFilter=tab.value"
      class="px-4 py-2 rounded-pill border-0 filter-tab"
      [class.tab-active]="roleFilter===tab.value"
      [class.tab-inactive]="roleFilter!==tab.value">
      {{tab.label}} ({{countByRole(tab.value)}})
    </button>
  </div>

  <div class="card-premium p-0" style="overflow:hidden;">
    <div class="table-responsive">
      <table class="table table-clean mb-0" style="min-width:750px;">
        <thead>
          <tr><th>User</th><th>Email</th><th>Role</th><th>Dives</th><th>Joined</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody>
          <tr *ngFor="let u of filtered">
            <td>
              <div class="d-flex align-items-center gap-2">
                <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold user-avatar">
                  {{u.name.charAt(0)}}
                </div>
                <span class="user-name">{{u.name}}</span>
              </div>
            </td>
            <td class="email-cell">{{u.email}}</td>
            <td>
              <span [class]="u.role==='center'?'badge-pending':'badge-active'">
                {{u.role==='center'?'Dive Center':'Diver'}}
              </span>
            </td>
            <td class="dives-cell">{{u.role==='customer' ? u.dives : '—'}}</td>
            <td class="joined-cell">{{u.joined}}</td>
            <td><span [class]="u.status==='active'?'badge-active':'badge-blocked'">{{u.status}}</span></td>
            <td>
              <div class="d-flex gap-1">
                <button (click)="toggleStatus(u.id)" [title]="u.status==='active'?'Block':'Unblock'"
                  class="border-0 p-2 rounded-2"
                  [class.action-block]="u.status==='active'"
                  [class.action-unblock]="u.status!=='active'">
                  <span class="material-symbols-outlined action-icon">
                    {{u.status==='active'?'block':'lock_open'}}
                  </span>
                </button>
                <button (click)="delete(u.id)" title="Delete"
                  class="border-0 p-2 rounded-2 action-delete">
                  <span class="material-symbols-outlined action-icon">delete</span>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
