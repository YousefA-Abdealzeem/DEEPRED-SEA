<!-- Hero Section -->
<section class="contact-hero">
  <div class="contact-hero-bg" style="background-image: url('assets/images/contact.jpg');"></div>
  <div class="contact-hero-overlay"></div>
  <div class="container position-relative">
    <div class="contact-hero-content">
      <div class="contact-eyebrow mb-4">Contact Us</div>
      <h1 class="contact-hero-title">We'd love to<br><span class="contact-title-accent">hear from you.</span></h1>
    </div>
  </div>
</section>

<!-- Content -->
<div class="contact-content">
  <div class="container">

    <div class="row g-5 justify-content-center">

      <!-- Info Cards -->
      <div class="col-12 col-lg-4">
        <div class="d-flex flex-column gap-3 contact-block--anim">

          <div class="contact-info-card">
            <div class="contact-info-icon">
              <span class="material-symbols-outlined">mail</span>
            </div>
            <div>
              <div class="contact-info-label">Email</div>
              <div class="contact-info-value">hello&#64;aquabase.eg</div>
            </div>
          </div>

          <div class="contact-info-card">
            <div class="contact-info-icon">
              <span class="material-symbols-outlined">phone</span>
            </div>
            <div>
              <div class="contact-info-label">Phone</div>
              <div class="contact-info-value">+20 100 000 0000</div>
            </div>
          </div>

          <div class="contact-info-card">
            <div class="contact-info-icon">
              <span class="material-symbols-outlined">location_on</span>
            </div>
            <div>
              <div class="contact-info-label">Location</div>
              <div class="contact-info-value">Hurghada, Red Sea, Egypt</div>
            </div>
          </div>

          <div class="contact-info-card contact-info-card--dark">
            <div class="contact-info-icon contact-info-icon--light">
              <span class="material-symbols-outlined">public</span>
            </div>
            <div>
              <div class="contact-info-label contact-info-label--light">Built by</div>
              <a href="https://devtriplet-6425a.web.app/" target="_blank" class="contact-info-value contact-devlink">DevTriplet ↗</a>
            </div>
          </div>

        </div>
      </div>

      <!-- Form -->
      <div class="col-12 col-lg-7 contact-block--anim contact-block--delay">
        <div class="contact-form-card">
          <div class="contact-form-tag">Send a Message</div>
          <h5 class="contact-form-title mb-4">Got something on<br>your mind?</h5>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="contact-label">Full Name</label>
              <input type="text" class="form-control-tonal w-100 mt-1" placeholder="Ahmed Mohamed">
            </div>
            <div class="col-12 col-md-6">
              <label class="contact-label">Email</label>
              <input type="email" class="form-control-tonal w-100 mt-1" placeholder="ahmed&#64;email.com">
            </div>
            <div class="col-12">
              <label class="contact-label">Subject</label>
              <input type="text" class="form-control-tonal w-100 mt-1" placeholder="How can we help?">
            </div>
            <div class="col-12">
              <label class="contact-label">Message</label>
              <textarea class="form-control-tonal w-100 mt-1 contact-textarea" placeholder="Tell us more..."></textarea>
            </div>
            <div class="col-12">
              <button class="btn-primary-gradient w-100 py-3 justify-content-center">
                <span class="material-symbols-outlined me-2">send</span>Send Message
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
