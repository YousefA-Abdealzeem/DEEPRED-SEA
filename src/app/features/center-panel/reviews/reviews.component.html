<div class="animate-fadeInUp">
  <div class="mb-4">
    <h2 class="page-title">Reviews</h2>
    <p class="page-subtitle">Manage your reputation</p>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-12 col-md-4">
      <div class="card-premium p-4 text-center">
        <div class="avg-rating-val">{{avgRating}}</div>
        <div class="d-flex justify-content-center gap-1 my-2">
          <span class="material-symbols-outlined avg-star">star</span>
          <span class="material-symbols-outlined avg-star">star</span>
          <span class="material-symbols-outlined avg-star">star</span>
          <span class="material-symbols-outlined avg-star">star</span>
          <span class="material-symbols-outlined avg-star">star</span>
        </div>
        <div class="avg-label">Average Rating</div>
      </div>
    </div>
    <div class="col-6 col-md-4">
      <div class="card-premium p-4 text-center">
        <div class="stat-big-val">{{reviews.length}}</div>
        <div class="stat-big-label">Total Reviews</div>
      </div>
    </div>
    <div class="col-6 col-md-4">
      <div class="card-premium p-4 text-center">
        <div class="stat-big-val">{{goodReviewsCount}}</div>
        <div class="stat-big-label">4★ / 5★ Reviews</div>
      </div>
    </div>
  </div>

  <div class="d-flex flex-column gap-4">
    <div *ngFor="let r of reviews" class="card-premium p-4">
      <div class="d-flex align-items-start gap-3">
        <div class="rounded-circle d-flex align-items-center justify-content-center fw-bold review-avatar">
          {{r.avatar}}
        </div>
        <div class="flex-grow-1">
          <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-1">
            <div>
              <span class="reviewer-name">{{r.diver}}</span>
              <span class="reviewer-meta">· {{r.trip}} · {{r.date}}</span>
            </div>
            <div class="d-flex gap-0">
              <span *ngFor="let s of r.starsList" class="material-symbols-outlined review-star"
                [style.color]="s ? '#f59e0b' : 'var(--surface-container-high)'">star</span>
            </div>
          </div>
          <p class="review-text">{{r.text}}</p>

          <!-- Existing reply -->
          <div *ngIf="r.replied && r.reply" class="p-3 rounded-3 mb-3 reply-box">
            <div class="reply-box-label">
              <span class="material-symbols-outlined reply-box-icon">reply</span> Your Reply
            </div>
            <p class="reply-box-text">{{r.reply}}</p>
          </div>

          <!-- Reply input -->
          <div *ngIf="replyingId===r.id" class="animate-fadeInUp">
            <textarea [(ngModel)]="replyText" rows="3" placeholder="Write a professional reply..."
              class="form-control-tonal w-100 mb-2" style="resize:none;"></textarea>
            <div class="d-flex gap-2">
              <button (click)="submitReply(r)"
                class="btn-primary-gradient px-4 py-2 d-flex align-items-center gap-1" style="font-size:.85rem;">
                <span class="material-symbols-outlined reply-send-icon">send</span>Send Reply
              </button>
              <button (click)="replyingId=null" class="btn-secondary-tonal px-4 py-2" style="font-size:.85rem;">Cancel</button>
            </div>
          </div>

          <button *ngIf="!r.replied && replyingId!==r.id" (click)="openReply(r.id)"
            class="d-flex align-items-center gap-1 border-0 bg-transparent mt-1 reply-btn">
            <span class="material-symbols-outlined reply-btn-icon">reply</span>Reply
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
