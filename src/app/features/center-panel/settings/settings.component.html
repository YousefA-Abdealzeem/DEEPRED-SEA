<div class="animate-fadeInUp">
  <div class="mb-4">
    <h2 class="page-title">Settings</h2>
    <p class="page-subtitle">Configure your center preferences</p>
  </div>

  <div *ngIf="saved" class="alert d-flex align-items-center gap-2 mb-4 animate-fadeInUp save-success">
    <span class="material-symbols-outlined">check_circle</span>
    Settings saved successfully!
  </div>

  <div class="row g-4">
    <div class="col-12 col-lg-6">
      <div class="card-premium p-4 p-md-5">
        <h6 class="section-heading">
          <span class="material-symbols-outlined section-heading-icon me-2">notifications</span>
          Notification Preferences
        </h6>
        <div class="d-flex flex-column gap-3">
          <div *ngFor="let item of notifItems"
               class="d-flex align-items-center justify-content-between p-3 rounded-3 toggle-item">
            <div>
              <div class="toggle-label">{{item.label}}</div>
              <div class="toggle-desc">{{item.desc}}</div>
            </div>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" role="switch"
                [(ngModel)]="this[item.key]"
                style="width:3em;height:1.5em;cursor:pointer;">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="col-12 col-lg-6">
      <div class="card-premium p-4 p-md-5">
        <h6 class="section-heading">
          <span class="material-symbols-outlined section-heading-icon me-2">tune</span>
          Booking Settings
        </h6>
        <div class="d-flex flex-column gap-3">
          <div *ngFor="let item of bookingItems"
               class="d-flex align-items-center justify-content-between p-3 rounded-3 toggle-item">
            <div>
              <div class="toggle-label">{{item.label}}</div>
              <div class="toggle-desc">{{item.desc}}</div>
            </div>
            <div class="form-check form-switch m-0">
              <input class="form-check-input" type="checkbox" role="switch"
                [(ngModel)]="this[item.key]"
                style="width:3em;height:1.5em;cursor:pointer;">
            </div>
          </div>
        </div>
        <button (click)="save()" class="btn-primary-gradient mt-4 px-5 py-3 d-flex align-items-center gap-2">
          <span class="material-symbols-outlined" style="font-size:1rem;">save</span>Save Settings
        </button>

        <div class="mt-4 pt-4" style="border-top:1px solid var(--surface-container-high);">
          <h6 class="danger-heading">Danger Zone</h6>
          <button class="d-flex align-items-center gap-2 px-4 py-2 rounded-pill border-0 danger-btn">
            <span class="material-symbols-outlined danger-icon">pause_circle</span>
            Temporarily Deactivate Center
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
